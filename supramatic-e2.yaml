substitutions:
  name: "supramatic-e2"
  friendly_name: "Garage Door"
  rs485_rx_pin: GPIO16
  rs485_tx_pin: GPIO17

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    board_build.f_cpu: 240000000L

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    uapbridge_esp: DEBUG
    uapbridge.cover: DEBUG
    uapbridge.binary_sensor: DEBUG

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key_supramatic_e2

ota:
  - platform: esphome
    password: !secret ota_password_supramatic_e2

safe_mode:
  disabled: false
  num_attempts: 10
  boot_is_good_after: 1min
  reboot_timeout: 10min

ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO9

uart:
  id: uart_bus
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: ${rs485_rx_pin}
  tx_pin: ${rs485_tx_pin}
  rx_buffer_size: 256

uapbridge_esp:
  id: garage_door_comp
  uart_id: uart_bus
  auto_correction: false
  diagnostic_mode: false
  listen_only: false
  command_timeout: 1200ms
  valid_broadcast_timeout: 10s
  require_fresh_broadcast_for_commands: true
  allow_remote_close: true
  allow_remote_impulse: true
  use_unverified_stop_command: true
  trust_light_feedback: false
  http_debug_port: 8080
  http_debug_send_gaps: true
  http_debug_gap_threshold: 3ms
  http_debug_history_size: 200

cover:
  - platform: uapbridge
    name: "${friendly_name}"
    device_class: garage
    time_based_position: true
    open_duration: 18s
    close_duration: 18s
    position_publish_interval: 1s
    position_deadband: 2%
    venting_position: 20%
    learn_travel_durations: true

switch:
  - platform: uapbridge
    venting_switch:
      name: "${friendly_name} Venting"
      disabled_by_default: true

binary_sensor:
  - platform: status
    name: "${friendly_name} ESPHome Status"
  - platform: uapbridge
    relay_state:
      name: "${friendly_name} Relay State"
    error_state:
      name: "${friendly_name} Error State"
    prewarn_state:
      name: "${friendly_name} Prewarn State"
    got_valid_broadcast:
      name: "${friendly_name} Valid HCP Broadcast"

output:
  - platform: uapbridge
    id: garage_light_output

light:
  - platform: uapbridge
    id: garage_light
    name: "${friendly_name} Light"
    output: garage_light_output
    restore_mode: RESTORE_DEFAULT_OFF

text_sensor:
  - platform: uapbridge
    id: garage_door_state
    name: "${friendly_name} State"
  - platform: ethernet_info
    ip_address:
      name: "${friendly_name} IP Address"
    mac_address:
      name: "${friendly_name} MAC Address"

button:
  - platform: uapbridge
    vent_button:
      name: "${friendly_name} Vent"
      disabled_by_default: true
