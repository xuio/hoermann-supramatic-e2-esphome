substitutions:
  name: "supramatic-e2"
  friendly_name: "Garage Door"
  rs485_rx_pin: GPIO16
  rs485_tx_pin: GPIO17

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    board_build.f_cpu: 240000000L

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    uapbridge_esp: DEBUG
    uapbridge.cover: DEBUG
    uapbridge.light: DEBUG
    uapbridge.binary_sensor: DEBUG

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key_supramatic_e2

ota:
  - platform: esphome
    password: !secret ota_password_supramatic_e2
    allow_partition_access: true

safe_mode:
  disabled: false
  num_attempts: 10
  boot_is_good_after: 1min
  reboot_timeout: 10min

ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO9

uart:
  id: uart_bus
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: ${rs485_rx_pin}
  tx_pin: ${rs485_tx_pin}
  rx_buffer_size: 256

uapbridge_esp:
  id: garage_door_comp
  uart_id: uart_bus
  auto_correction: false
  diagnostic_mode: false
  listen_only: false
  command_timeout: 1200ms
  valid_broadcast_timeout: 10s
  require_fresh_broadcast_for_commands: true
  allow_remote_close: true
  allow_remote_impulse: true
  use_unverified_stop_command: true
  trust_light_feedback: false
  http_debug_port: 8080
  http_debug_send_gaps: true
  http_debug_gap_threshold: 50ms
  http_debug_history_size: 80
  # Can also be toggled at runtime:
  #   /persistent_log/start
  #   /persistent_log/stop
  #   /persistent_log/clear
  #   /persistent_log
  persistent_log: false

cover:
  - platform: uapbridge
    id: garage_door_cover
    name: "${friendly_name}"
    device_class: garage
    time_based_position: true
    # Calibrated from 2026-05-27 ArUco/video + HCP sync captures.
    # Durations are visible door motion; delays model command-to-motion and
    # physical-end-to-HCP-end-state latency separately.
    open_duration: 10215ms
    close_duration: 18565ms
    open_start_delay: 2500ms
    close_start_delay: 1500ms
    open_report_delay: 600ms
    close_report_delay: 2600ms
    close_obstruction_grace: 5s
    position_publish_interval: 1s
    position_deadband: 2%
    venting_position: 3.6%
    learn_travel_durations: false
    use_motion_curve: true

switch:
  - platform: uapbridge
    venting_switch:
      name: "${friendly_name} Venting"
      disabled_by_default: true

binary_sensor:
  - platform: status
    name: "${friendly_name} ESPHome Status"
  - platform: uapbridge
    relay_state:
      name: "${friendly_name} Relay State"
    error_state:
      name: "${friendly_name} Error State"
    prewarn_state:
      name: "${friendly_name} Prewarn State"
    obstruction_state:
      name: "${friendly_name} Obstruction State"
    got_valid_broadcast:
      name: "${friendly_name} Valid HCP Broadcast"

output:
  - platform: uapbridge
    id: garage_light_output

light:
  - platform: uapbridge
    id: garage_light
    name: "${friendly_name} Light"
    output: garage_light_output
    restore_mode: RESTORE_DEFAULT_OFF
    auto_courtesy_light: true
    courtesy_light_duration: 120s

number:
  - platform: template
    id: garage_door_target_position
    name: "${friendly_name} Target Position"
    icon: mdi:garage-open
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    update_interval: 1s
    lambda: |-
      return id(garage_door_cover).position * 100.0f;
    set_action:
      - lambda: |-
          auto call = id(garage_door_cover).make_call();
          call.set_position(x / 100.0f);
          call.perform();
  - platform: template
    id: garage_door_open_duration_seconds
    name: "${friendly_name} Open Duration"
    icon: mdi:timer-outline
    entity_category: config
    min_value: 5
    max_value: 60
    step: 0.1
    mode: box
    unit_of_measurement: s
    update_interval: 5s
    lambda: |-
      return id(garage_door_cover).get_open_duration() / 1000.0f;
    set_action:
      - lambda: |-
          id(garage_door_cover).set_open_duration((uint32_t) (x * 1000.0f));
  - platform: template
    id: garage_door_close_duration_seconds
    name: "${friendly_name} Close Duration"
    icon: mdi:timer-outline
    entity_category: config
    min_value: 5
    max_value: 60
    step: 0.1
    mode: box
    unit_of_measurement: s
    update_interval: 5s
    lambda: |-
      return id(garage_door_cover).get_close_duration() / 1000.0f;
    set_action:
      - lambda: |-
          id(garage_door_cover).set_close_duration((uint32_t) (x * 1000.0f));
  - platform: template
    id: garage_door_open_start_delay_seconds
    name: "${friendly_name} Open Start Delay"
    icon: mdi:timer-sand
    entity_category: config
    min_value: 0
    max_value: 15
    step: 0.1
    mode: box
    unit_of_measurement: s
    update_interval: 5s
    lambda: |-
      return id(garage_door_cover).get_open_start_delay() / 1000.0f;
    set_action:
      - lambda: |-
          id(garage_door_cover).set_open_start_delay((uint32_t) (x * 1000.0f));
  - platform: template
    id: garage_door_close_start_delay_seconds
    name: "${friendly_name} Close Start Delay"
    icon: mdi:timer-sand
    entity_category: config
    min_value: 0
    max_value: 15
    step: 0.1
    mode: box
    unit_of_measurement: s
    update_interval: 5s
    lambda: |-
      return id(garage_door_cover).get_close_start_delay() / 1000.0f;
    set_action:
      - lambda: |-
          id(garage_door_cover).set_close_start_delay((uint32_t) (x * 1000.0f));
  - platform: template
    id: garage_door_open_report_delay_seconds
    name: "${friendly_name} Open Report Delay"
    icon: mdi:timer-check-outline
    entity_category: config
    min_value: 0
    max_value: 15
    step: 0.1
    mode: box
    unit_of_measurement: s
    update_interval: 5s
    lambda: |-
      return id(garage_door_cover).get_open_report_delay() / 1000.0f;
    set_action:
      - lambda: |-
          id(garage_door_cover).set_open_report_delay((uint32_t) (x * 1000.0f));
  - platform: template
    id: garage_door_close_report_delay_seconds
    name: "${friendly_name} Close Report Delay"
    icon: mdi:timer-check-outline
    entity_category: config
    min_value: 0
    max_value: 15
    step: 0.1
    mode: box
    unit_of_measurement: s
    update_interval: 5s
    lambda: |-
      return id(garage_door_cover).get_close_report_delay() / 1000.0f;
    set_action:
      - lambda: |-
          id(garage_door_cover).set_close_report_delay((uint32_t) (x * 1000.0f));

sensor:
  - platform: template
    id: garage_door_raw_hcp_status
    name: "${friendly_name} Raw HCP Status"
    icon: mdi:code-tags
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      return id(garage_door_comp).get_raw_status();
  - platform: template
    id: garage_door_status_transition_count
    name: "${friendly_name} HCP Status Transitions"
    icon: mdi:counter
    entity_category: diagnostic
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 1s
    lambda: |-
      return id(garage_door_comp).get_status_transition_count();
  - platform: template
    id: garage_door_unknown_valid_frame_count
    name: "${friendly_name} Unknown Valid HCP Frames"
    icon: mdi:counter
    entity_category: diagnostic
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 1s
    lambda: |-
      return id(garage_door_comp).get_unknown_valid_frame_count();

text_sensor:
  - platform: uapbridge
    id: garage_door_state
    name: "${friendly_name} State"
  - platform: template
    id: garage_door_raw_hcp_status_hex
    name: "${friendly_name} Raw HCP Status Hex"
    icon: mdi:code-tags
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      char buffer[8];
      snprintf(buffer, sizeof(buffer), "0x%04X", id(garage_door_comp).get_raw_status());
      return std::string(buffer);
  - platform: template
    id: garage_door_last_hcp_frame
    name: "${friendly_name} Last HCP Frame"
    icon: mdi:code-tags
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      return id(garage_door_comp).get_last_valid_frame_hex();
  - platform: ethernet_info
    ip_address:
      name: "${friendly_name} IP Address"
    mac_address:
      name: "${friendly_name} MAC Address"

button:
  - platform: uapbridge
    vent_button:
      name: "${friendly_name} Vent"
      disabled_by_default: true
