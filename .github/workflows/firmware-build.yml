name: Firmware Builds

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  esphome:
    name: Build ${{ matrix.family }} firmware
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: HCP1
            config: configs/supramatic-e2.yaml
            env_name: supramatic-e2
            artifact: hcp1-supramatic-e2
          - family: HCP2
            config: configs/supramatic-4-tester.yaml
            env_name: supramatic-4-tester
            artifact: hcp2-supramatic-4-tester

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate build secrets
        run: uv run garage-init-secrets

      - name: Validate ESPHome config
        run: uv run esphome config "${{ matrix.config }}"

      - name: Compile ESPHome firmware
        run: uv run esphome compile "${{ matrix.config }}"

      - name: Collect firmware artifacts
        run: |
          set -eu

          build_dir="configs/.esphome/build/${{ matrix.env_name }}/.pioenvs/${{ matrix.env_name }}"
          artifact_dir="firmware-artifacts/${{ matrix.artifact }}"

          test -f "$build_dir/firmware.bin"
          mkdir -p "$artifact_dir"

          for file in firmware.bin firmware.ota.bin firmware.factory.bin firmware.elf bootloader.bin partitions.bin ota_data_initial.bin; do
            if [ -f "$build_dir/$file" ]; then
              cp "$build_dir/$file" "$artifact_dir/$file"
            fi
          done
          cp "${{ matrix.config }}" "$artifact_dir/config.yaml"

          {
            echo "family=${{ matrix.family }}"
            echo "name=${{ matrix.env_name }}"
            echo "config=${{ matrix.config }}"
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "event=${GITHUB_EVENT_NAME}"
          } > "$artifact_dir/manifest.txt"

          (
            cd "$artifact_dir"
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: firmware-artifacts/${{ matrix.artifact }}
          retention-days: 30

  publish-latest:
    name: Publish latest public firmware release
    runs-on: ubuntu-latest
    needs: esphome
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download firmware artifacts
        uses: actions/download-artifact@v8
        with:
          path: firmware-artifacts

      - name: Prepare public release assets
        run: |
          set -eu

          mkdir -p release-assets

          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-12)"
          checksum_asset="SHA256SUMS-${short_sha}.txt"

          package_artifact() {
            artifact="$1"
            title="$2"
            chip_family="$3"
            improv="$4"

            artifact_dir="firmware-artifacts/${artifact}"
            factory_asset="${artifact}-firmware.factory-${short_sha}.bin"
            ota_asset="${artifact}-firmware.ota-${short_sha}.bin"
            build_manifest_asset="${artifact}-manifest-${short_sha}.txt"
            web_manifest_asset="${artifact}-web-flasher-manifest-${short_sha}.json"
            bundle_asset="${artifact}-${short_sha}.zip"

            test -d "$artifact_dir"
            test -f "$artifact_dir/firmware.factory.bin"
            test -f "$artifact_dir/firmware.ota.bin"
            test -f "$artifact_dir/manifest.txt"

            cp "$artifact_dir/firmware.factory.bin" "release-assets/${factory_asset}"
            cp "$artifact_dir/firmware.ota.bin" "release-assets/${ota_asset}"
            cp "$artifact_dir/manifest.txt" "release-assets/${build_manifest_asset}"

            TITLE="$title" \
            CHIP_FAMILY="$chip_family" \
            IMPROV="$improv" \
            VERSION="$short_sha" \
            FACTORY_ASSET="$factory_asset" \
            WEB_MANIFEST="release-assets/${web_manifest_asset}" \
              python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          base_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/firmware-latest"
          build = {
              "chipFamily": os.environ["CHIP_FAMILY"],
              "parts": [
                  {
                      "path": f"{base_url}/{os.environ['FACTORY_ASSET']}",
                      "offset": 0,
                  }
              ],
          }
          if os.environ["IMPROV"] == "true":
              build["improv"] = True
          manifest = {
              "name": os.environ["TITLE"],
              "version": os.environ["VERSION"],
              "new_install_prompt_erase": True,
              "builds": [build],
          }
          Path(os.environ["WEB_MANIFEST"]).write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

            bundle_dir="$(mktemp -d)"
            cp "release-assets/${factory_asset}" "$bundle_dir/"
            cp "release-assets/${ota_asset}" "$bundle_dir/"
            cp "release-assets/${build_manifest_asset}" "$bundle_dir/"
            cp "release-assets/${web_manifest_asset}" "$bundle_dir/"
            (
              cd "$bundle_dir"
              sha256sum * > "${checksum_asset}"
              zip -qr "${GITHUB_WORKSPACE}/release-assets/${bundle_asset}" .
            )
            rm -rf "$bundle_dir"
          }

          package_artifact "hcp1-supramatic-e2" "Garage Door HCP1 SupraMatic E2" "ESP32-S3" "false"
          package_artifact "hcp2-supramatic-4-tester" "Garage Door HCP2 Series 4 Tester" "ESP32-C6" "true"

          (
            cd release-assets
            sha256sum * > "${checksum_asset}"
          )

          hcp1_factory_asset="hcp1-supramatic-e2-firmware.factory-${short_sha}.bin"
          hcp1_ota_asset="hcp1-supramatic-e2-firmware.ota-${short_sha}.bin"
          hcp1_build_manifest_asset="hcp1-supramatic-e2-manifest-${short_sha}.txt"
          hcp1_web_manifest_asset="hcp1-supramatic-e2-web-flasher-manifest-${short_sha}.json"
          hcp1_bundle_asset="hcp1-supramatic-e2-${short_sha}.zip"
          hcp2_factory_asset="hcp2-supramatic-4-tester-firmware.factory-${short_sha}.bin"
          hcp2_ota_asset="hcp2-supramatic-4-tester-firmware.ota-${short_sha}.bin"
          hcp2_build_manifest_asset="hcp2-supramatic-4-tester-manifest-${short_sha}.txt"
          hcp2_web_manifest_asset="hcp2-supramatic-4-tester-web-flasher-manifest-${short_sha}.json"
          hcp2_bundle_asset="hcp2-supramatic-4-tester-${short_sha}.zip"

          cat > release-notes.md <<EOF
          Latest successful firmware build from \`main\` (\`${short_sha}\`).

          Public direct downloads for the HCP1 SupraMatic E2 / ESP32-S3-ETH image:

          - Easy flash image: \`${hcp1_factory_asset}\`
            (merged ESP32-S3 image, flash at offset \`0x0\`)
          - ESP Web Tools manifest: \`${hcp1_web_manifest_asset}\`
          - OTA image: \`${hcp1_ota_asset}\`
          - Build manifest: \`${hcp1_build_manifest_asset}\`
          - Commit bundle: \`${hcp1_bundle_asset}\`

          Public direct downloads for the HCP2 Series 4 tester / ESP32-C6 image:

          - Easy flash image: \`${hcp2_factory_asset}\`
            (merged ESP32-C6 image, flash at offset \`0x0\`)
          - ESP Web Tools manifest: \`${hcp2_web_manifest_asset}\`
          - OTA image: \`${hcp2_ota_asset}\`
          - Build manifest: \`${hcp2_build_manifest_asset}\`
          - Commit bundle: \`${hcp2_bundle_asset}\`

          Shared:

          - Checksums: \`${checksum_asset}\`

          The HCP1 image is built from the standard Ethernet config with generated
          CI ESPHome API/OTA credentials. For a permanent HCP1 install, build or
          upload from your own private \`configs/secrets.yaml\`.

          The HCP2 public tester image does not bake in a shared ESPHome API
          encryption key and keeps the native API plaintext, so Home Assistant
          adoption should not ask for an encryption key. OTA has no password in
          the public image, so there is no shared public OTA password; for a
          private deployment, add API encryption and OTA auth in a local/private
          config and upload that image after adoption.
          EOF

      - name: Publish firmware-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release delete firmware-latest --cleanup-tag --yes 2>/dev/null || true
          gh release create firmware-latest release-assets/* \
            --title "Latest firmware build" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA" \
            --latest
