name: Firmware Builds

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  esphome:
    name: Build ${{ matrix.family }} firmware
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: HCP1
            config: configs/supramatic-e2.yaml
            env_name: supramatic-e2
            artifact: hcp1-supramatic-e2
            public_secret_keys: api_key_supramatic_e2 ota_password_supramatic_e2
          - family: HCP2
            config: configs/supramatic-4-tester.yaml
            env_name: supramatic-4-tester
            artifact: hcp2-supramatic-4-tester
            public_secret_keys: api_key_supramatic_4_tester ota_password_supramatic_4_tester

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate build secrets
        run: uv run garage-init-secrets

      - name: Validate ESPHome config
        run: uv run esphome config "${{ matrix.config }}"

      - name: Compile ESPHome firmware
        run: uv run esphome compile "${{ matrix.config }}"

      - name: Collect firmware artifacts
        env:
          PUBLIC_SECRET_KEYS: ${{ matrix.public_secret_keys }}
        run: |
          set -eu

          build_dir="configs/.esphome/build/${{ matrix.env_name }}/.pioenvs/${{ matrix.env_name }}"
          artifact_dir="firmware-artifacts/${{ matrix.artifact }}"

          test -f "$build_dir/firmware.bin"
          mkdir -p "$artifact_dir"

          for file in firmware.bin firmware.ota.bin firmware.factory.bin firmware.elf bootloader.bin partitions.bin ota_data_initial.bin; do
            if [ -f "$build_dir/$file" ]; then
              cp "$build_dir/$file" "$artifact_dir/$file"
            fi
          done
          cp "${{ matrix.config }}" "$artifact_dir/config.yaml"

          {
            echo "family=${{ matrix.family }}"
            echo "name=${{ matrix.env_name }}"
            echo "config=${{ matrix.config }}"
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "event=${GITHUB_EVENT_NAME}"
          } > "$artifact_dir/manifest.txt"

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          secrets_text = Path("configs/secrets.yaml").read_text(encoding="utf-8")
          values = {}
          for key in os.environ["PUBLIC_SECRET_KEYS"].split():
              match = re.search(rf"^{re.escape(key)}:\s*[\"']?([^\"'\n#]+)", secrets_text, re.MULTILINE)
              if not match:
                  raise SystemExit(f"missing generated secret {key}")
              values[key] = match.group(1).strip()

          lines = [
              "Public prebuilt firmware credentials",
              "",
              "These values are intentionally public because they belong to the downloadable",
              "prebuilt image. Build the YAML locally with your own configs/secrets.yaml for",
              "a private installation.",
              "",
              f"artifact=${{ matrix.artifact }}",
              f"config=${{ matrix.config }}",
              f"commit={os.environ['GITHUB_SHA']}",
              "",
          ]
          lines.extend(f"{key}={value}" for key, value in values.items())
          Path("firmware-artifacts/${{ matrix.artifact }}/public-credentials.txt").write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

          (
            cd "$artifact_dir"
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: firmware-artifacts/${{ matrix.artifact }}
          retention-days: 30

  publish-latest:
    name: Publish latest public firmware release
    runs-on: ubuntu-latest
    needs: esphome
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-artifacts

      - name: Prepare public release assets
        run: |
          set -eu

          mkdir -p release-assets

          for artifact in hcp1-supramatic-e2 hcp2-supramatic-4-tester; do
            artifact_dir="firmware-artifacts/${artifact}"
            test -d "$artifact_dir"

            (
              cd "$artifact_dir"
              zip -qr "../../release-assets/${artifact}.zip" .
            )

            for file in firmware.bin firmware.ota.bin firmware.factory.bin bootloader.bin partitions.bin ota_data_initial.bin manifest.txt public-credentials.txt; do
              if [ -f "$artifact_dir/$file" ]; then
                cp "$artifact_dir/$file" "release-assets/${artifact}-${file}"
              fi
            done
          done

          (
            cd release-assets
            sha256sum * > SHA256SUMS
          )

          cat > release-notes.md <<'EOF'
          Latest successful firmware build from `main`.

          Public direct downloads:

          - HCP1 bundle: `hcp1-supramatic-e2.zip`
          - HCP1 factory image: `hcp1-supramatic-e2-firmware.factory.bin`
          - HCP1 OTA image: `hcp1-supramatic-e2-firmware.ota.bin`
          - HCP2 Series 4 tester bundle: `hcp2-supramatic-4-tester.zip`
          - HCP2 Series 4 tester factory image: `hcp2-supramatic-4-tester-firmware.factory.bin`
          - HCP2 Series 4 tester OTA image: `hcp2-supramatic-4-tester-firmware.ota.bin`

          Each bundle includes `public-credentials.txt` with the ESPHome API key
          and OTA password generated for that public image. These credentials are
          public by design; build locally if you need private credentials.
          EOF

      - name: Publish firmware-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release delete firmware-latest --cleanup-tag --yes 2>/dev/null || true
          gh release create firmware-latest release-assets/* \
            --title "Latest firmware build" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA" \
            --latest
