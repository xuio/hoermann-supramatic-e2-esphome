name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_wokwi:
        description: "Run HCP2 Wokwi gates"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    name: Validate ESPHome and tools
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate example secrets
        run: uv run garage-init-secrets

      - name: Validate ESPHome configurations
        run: |
          uv run esphome config configs/supramatic-e2.yaml
          uv run esphome config configs/supramatic-e2-minimal.yaml
          uv run esphome config configs/supramatic-e2-monitor.yaml
          uv run esphome config configs/supramatic-e2-monitor-rx17.yaml
          uv run esphome config configs/supramatic-e2-monitor-idle-tx.yaml
          uv run esphome config configs/supramatic-e2-proxy.yaml
          uv run esphome config configs/supramatic-4-dev.yaml
          uv run esphome config configs/supramatic-4-tester.yaml
          uv run esphome config configs/supramatic-4-c6-hp-realtime.yaml
          uv run esphome config configs/supramatic-4-wokwi.yaml

      - name: Compile main firmware
        run: uv run esphome compile configs/supramatic-e2.yaml

      - name: Compile HCP2 ESPHome dev firmware
        run: uv run esphome compile configs/supramatic-4-dev.yaml

      - name: Compile HCP2 ESP32-C6 HP realtime firmware
        run: |
          uv run esphome compile configs/supramatic-4-c6-hp-realtime.yaml
          uv run garage-check-esp32-realtime-build --profile esp32c6

      - name: Compile HCP2 ESP32 realtime inert firmware
        run: |
          tmpdir="$(mktemp -d)"
          cat > "$tmpdir/hcp2-esp32-realtime.yaml" <<YAML
          esphome:
            name: hcp2-esp32-rt
            build_path: "$tmpdir/build"

          esp32:
            board: esp32dev
            framework:
              type: esp-idf

          external_components:
            - source:
                type: local
                path: "$GITHUB_WORKSPACE/components"

          logger:
            level: INFO

          hcp2bridge:
            id: hcp2_test
            backend: esp32_realtime
          YAML
          uv run esphome compile "$tmpdir/hcp2-esp32-realtime.yaml"

      - name: Run Python tool self-test
        run: uv run garage-decode-phone-sync-video --self-test

      - name: Run HCP2 host tests
        run: uv run pytest tests/hcp2

      - name: Run HCP2 simulator self-test
        run: uv run garage-supramatic-sim --selftest

      - name: Run HCP2 simulator PTY smoke
        run: uv run garage-supramatic-sim --pty --cycles 1000 --report hcp2-sim-report.json

      - name: Run HCP2 sanitizer build
        run: make -C tests/hcp2 asan

  hcp2-lp:
    name: Build and emulate HCP2 LP blob
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Install RISC-V bare-metal compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf

      - name: Build HCP2 LP firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32c6
          path: firmware/hcp2-lp

      - name: Check embedded HCP2 LP blob
        run: uv run garage-update-hcp2-lp-blob --check

      - name: Run RVC smoke test
        run: uv run garage-hcp2-lp-emu --rvc-smoke

      - name: Run LP emulator mailbox tests
        run: uv run pytest tests/hcp2/test_lp_emu.py

      - name: Run dual-ISS mailbox suite
        run: |
          for interleave in 1 2 8 64 256; do
            uv run garage-hcp2-lp-emu \
              --dual \
              --interleave "$interleave" \
              --suite mailbox \
              --report "dual-iss-report-${interleave}.json"
          done

      - name: Run LP ISS closed loop
        run: >
          uv run garage-hcp2-lp-emu
          --blob firmware/hcp2-lp/build/hcp2_lp.bin
          --cycles 1000
          --report lp-report.json

      - name: Upload LP ISS report
        uses: actions/upload-artifact@v4
        with:
          name: hcp2-lp-iss-report
          path: |
            lp-report.json
            dual-iss-report-*.json
            firmware/hcp2-lp/build/hcp2_lp.bin
            firmware/hcp2-lp/build/hcp2_lp.elf
            firmware/hcp2-lp/build/hcp2_lp.map
            firmware/hcp2-lp/build/hcp2_lp.sym

  hcp2-wokwi:
    name: Manual HCP2 Wokwi gates
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_wokwi }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Check generated Wokwi constants
        run: uv run garage-generate-wokwi-hcp2-constants --check

      - name: Generate example secrets
        run: uv run garage-init-secrets

      - name: Build HCP2 bring-up firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32c6
          path: firmware/hcp2-bringup

      - name: Build HCP2 Wokwi LP probe firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32c6
          path: firmware/hcp2-bringup
          command: >
            idf.py -B build-wokwi
            -D SDKCONFIG=/tmp/hcp2-bringup-wokwi-sdkconfig
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.wokwi.defaults"
            build

      - name: Build HCP2 Wokwi HP fallback firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32c6
          path: firmware/hcp2-bringup
          command: >
            idf.py -B build-wokwi-hp-fallback
            -D SDKCONFIG=/tmp/hcp2-bringup-wokwi-hp-fallback-sdkconfig
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hp-fallback.defaults"
            build

      - name: Build HCP2 Wokwi HP fallback restart firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32c6
          path: firmware/hcp2-bringup
          command: >
            idf.py -B build-wokwi-hp-fallback-restart
            -D SDKCONFIG=/tmp/hcp2-bringup-wokwi-hp-fallback-restart-sdkconfig
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hp-fallback.defaults;sdkconfig.restart.defaults"
            build

      - name: Generate ISS baseline for Wokwi differential
        run: >
          uv run garage-hcp2-lp-emu
          --blob firmware/hcp2-bringup/build/esp-idf/main/hcp2_lp/hcp2_lp.bin
          --cycles 200
          --report iss-wokwi-baseline.json
          --trace iss-wokwi-trace.jsonl

      - name: Skip Wokwi scenarios without token
        if: ${{ env.WOKWI_CLI_TOKEN == '' }}
        run: echo "WOKWI_CLI_TOKEN is not set; skipping Phase 0d Wokwi scenarios."

      - name: Install Wokwi CLI
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh
          echo "$HOME/.wokwi/bin" >> "$GITHUB_PATH"

      - name: Compile Wokwi SupraMatic chip
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        working-directory: emulation/wokwi
        run: wokwi-cli chip compile supramatic4.chip.c -o chips/supramatic4.chip.wasm

      - name: Build HCP2 ESPHome Wokwi firmware
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: uv run esphome compile configs/supramatic-4-wokwi.yaml

      - name: Generate HCP2 ESPHome Wokwi flash layout
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          build = Path("configs/.esphome/build/supramatic-4-wokwi/.pioenvs/supramatic-4-wokwi")
          files = {
              "0x0": "bootloader.bin",
              "0x8000": "partitions.bin",
              "0x10000": "firmware.bin",
          }
          if (build / "ota_data_initial.bin").is_file():
              files["0x9000"] = "ota_data_initial.bin"

          missing = [name for name in files.values() if not (build / name).is_file()]
          if missing:
              raise SystemExit(f"missing ESPHome Wokwi flash files: {', '.join(missing)}")

          layout = {
              "write_flash_args": ["--flash_mode", "dio", "--flash_size", "4MB", "--flash_freq", "80m"],
              "flash_settings": {"flash_mode": "dio", "flash_size": "4MB", "flash_freq": "80m"},
              "flash_files": files,
              "bootloader": {"offset": "0x0", "file": files["0x0"], "encrypted": "false"},
              "partition-table": {"offset": "0x8000", "file": files["0x8000"], "encrypted": "false"},
              "app": {"offset": "0x10000", "file": files["0x10000"], "encrypted": "false"},
              "extra_esptool_args": {
                  "after": "hard_reset",
                  "before": "default_reset",
                  "stub": True,
                  "chip": "esp32c6",
              },
          }
          if "0x9000" in files:
              layout["otadata"] = {"offset": "0x9000", "file": files["0x9000"], "encrypted": "false"}
          (build / "flasher_args.json").write_text(json.dumps(layout, indent=2) + "\n")
          PY

      - name: Run Wokwi LP execution probe
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          set -o pipefail
          cp emulation/wokwi/wokwi.toml /tmp/hcp2-wokwi.toml
          restore() { cp /tmp/hcp2-wokwi.toml emulation/wokwi/wokwi.toml; }
          trap restore EXIT
          cp emulation/wokwi/wokwi.lp-probe.toml emulation/wokwi/wokwi.toml
          wokwi-cli emulation/wokwi \
            --scenario supervisor.yaml \
            --timeout 10000 \
            --serial-log-file emulation/wokwi/lp-probe.serial.log | tee emulation/wokwi/lp-probe.full.log
          restore
          trap - EXIT

      - name: Track Wokwi native LP-UART primary gate status
        if: ${{ env.WOKWI_CLI_TOKEN != '' && vars.WOKWI_NATIVE_LP_UART_REQUIRED != 'true' }}
        continue-on-error: true
        run: |
          set -o pipefail
          cp emulation/wokwi/wokwi.toml /tmp/hcp2-wokwi.toml
          restore() { cp /tmp/hcp2-wokwi.toml emulation/wokwi/wokwi.toml; }
          trap restore EXIT
          cp emulation/wokwi/wokwi.lp-probe.toml emulation/wokwi/wokwi.toml
          wokwi-cli emulation/wokwi \
            --scenario lp-uart-steady-state.yaml \
            --timeout 30000 \
            --serial-log-file emulation/wokwi/lp-uart-steady-state.serial.log | tee emulation/wokwi/lp-uart-steady-state.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/lp-uart-steady-state.full.log
          restore
          trap - EXIT

      - name: Run Wokwi native LP-UART primary gate
        if: ${{ env.WOKWI_CLI_TOKEN != '' && vars.WOKWI_NATIVE_LP_UART_REQUIRED == 'true' }}
        run: |
          set -o pipefail
          cp emulation/wokwi/wokwi.toml /tmp/hcp2-wokwi.toml
          restore() { cp /tmp/hcp2-wokwi.toml emulation/wokwi/wokwi.toml; }
          trap restore EXIT
          cp emulation/wokwi/wokwi.lp-probe.toml emulation/wokwi/wokwi.toml
          wokwi-cli emulation/wokwi \
            --scenario lp-uart-steady-state.yaml \
            --timeout 30000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/lp-uart-steady-state.serial.log | tee emulation/wokwi/lp-uart-steady-state.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/lp-uart-steady-state.full.log
          restore
          trap - EXIT

      - name: Run Wokwi native LP-UART scenario matrix
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          set -o pipefail
          cp emulation/wokwi/wokwi.toml /tmp/hcp2-wokwi.toml
          restore() { cp /tmp/hcp2-wokwi.toml emulation/wokwi/wokwi.toml; }
          trap restore EXIT
          cp emulation/wokwi/wokwi.lp-probe.toml emulation/wokwi/wokwi.toml
          wokwi-cli emulation/wokwi \
            --diagram-file diagram.opening.json \
            --scenario opening.yaml \
            --timeout 30000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/opening.serial.log | tee emulation/wokwi/opening.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/opening.full.log
          wokwi-cli emulation/wokwi \
            --diagram-file diagram.light-command.json \
            --scenario light-command.yaml \
            --timeout 30000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/light-command.serial.log | tee emulation/wokwi/light-command.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/light-command.full.log
          wokwi-cli emulation/wokwi \
            --diagram-file diagram.fault-recovery.json \
            --scenario fault-recovery.yaml \
            --timeout 30000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/fault-recovery.serial.log | tee emulation/wokwi/fault-recovery.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/fault-recovery.full.log
          restore
          trap - EXIT

      - name: Run Wokwi steady-state scenario
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          set -o pipefail
          wokwi-cli emulation/wokwi \
            --scenario steady-state.yaml \
            --timeout 30000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/steady-state.serial.log | tee emulation/wokwi/steady-state.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/steady-state.full.log

      - name: Compare Wokwi trace against ISS
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: >
          uv run garage-compare-hcp2-traces
          --wokwi-log emulation/wokwi/steady-state.full.log
          --iss-report iss-wokwi-baseline.json
          --latency-tolerance-us 100000
          --output trace-compare.json

      - name: Run Wokwi restart-loop scenario
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          set -o pipefail
          cp emulation/wokwi/wokwi.toml /tmp/hcp2-wokwi.toml
          restore() { cp /tmp/hcp2-wokwi.toml emulation/wokwi/wokwi.toml; }
          trap restore EXIT
          cp emulation/wokwi/wokwi.restart.toml emulation/wokwi/wokwi.toml
          wokwi-cli emulation/wokwi \
            --diagram-file diagram.restart.json \
            --scenario restart-loop.yaml \
            --timeout 35000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/restart-loop.serial.log | tee emulation/wokwi/restart-loop.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=restart-recovered" emulation/wokwi/restart-loop.full.log
          restore
          trap - EXIT

      - name: Run Wokwi ESPHome-built steady-state scenario
        if: ${{ env.WOKWI_CLI_TOKEN != '' }}
        run: |
          set -o pipefail
          cp emulation/wokwi/wokwi.toml /tmp/hcp2-wokwi.toml
          restore() { cp /tmp/hcp2-wokwi.toml emulation/wokwi/wokwi.toml; }
          trap restore EXIT
          cp emulation/wokwi/wokwi.esphome.toml emulation/wokwi/wokwi.toml
          wokwi-cli emulation/wokwi \
            --diagram-file diagram.esphome.json \
            --scenario esphome-steady-state.yaml \
            --timeout 150000 \
            --fail-text HCP2_WOKWI_VERDICT_FAIL \
            --serial-log-file emulation/wokwi/esphome-steady-state.serial.log | tee emulation/wokwi/esphome-steady-state.full.log
          grep -q "HCP2_WOKWI_VERDICT_OK reason=steady-state" emulation/wokwi/esphome-steady-state.full.log
          restore
          trap - EXIT

      - name: Upload Wokwi logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: hcp2-wokwi-logs
          path: |
            emulation/wokwi/*.log
            iss-wokwi-baseline.json
            iss-wokwi-trace.jsonl
            trace-compare.json
