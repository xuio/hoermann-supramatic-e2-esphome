name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate ESPHome and tools
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate example secrets
        run: uv run garage-init-secrets

      - name: Validate ESPHome configurations
        run: |
          uv run esphome config configs/supramatic-e2.yaml
          uv run esphome config configs/supramatic-e2-minimal.yaml
          uv run esphome config configs/supramatic-e2-monitor.yaml
          uv run esphome config configs/supramatic-e2-monitor-rx17.yaml
          uv run esphome config configs/supramatic-e2-monitor-idle-tx.yaml
          uv run esphome config configs/supramatic-e2-proxy.yaml

      - name: Compile main firmware
        run: uv run esphome compile configs/supramatic-e2.yaml

      - name: Run Python tool self-test
        run: uv run garage-decode-phone-sync-video --self-test

      - name: Run HCP2 host tests
        run: uv run pytest tests/hcp2

      - name: Run HCP2 simulator self-test
        run: uv run garage-supramatic-sim --selftest

      - name: Run HCP2 simulator PTY smoke
        run: uv run garage-supramatic-sim --pty --cycles 1000 --report hcp2-sim-report.json

      - name: Run HCP2 sanitizer build
        run: make -C tests/hcp2 asan

  hcp2-lp:
    name: Build and emulate HCP2 LP blob
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Build HCP2 LP firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32c6
          path: firmware/hcp2-lp

      - name: Run RVC smoke test
        run: uv run garage-hcp2-lp-emu --rvc-smoke

      - name: Run LP emulator mailbox tests
        run: uv run pytest tests/hcp2/test_lp_emu.py

      - name: Run LP ISS closed loop
        run: >
          uv run garage-hcp2-lp-emu
          --blob firmware/hcp2-lp/build/hcp2_lp.bin
          --cycles 1000
          --report lp-report.json

      - name: Upload LP ISS report
        uses: actions/upload-artifact@v4
        with:
          name: hcp2-lp-iss-report
          path: |
            lp-report.json
            firmware/hcp2-lp/build/hcp2_lp.bin
            firmware/hcp2-lp/build/hcp2_lp.elf
            firmware/hcp2-lp/build/hcp2_lp.map
            firmware/hcp2-lp/build/hcp2_lp.sym
