name: HCP2 Wokwi steady state
version: 1
author: garage-door-controller

steps:
  - wait-serial: "HCP2_BRINGUP_MODE lp-in-loop"
  - wait-serial: "HCP2_LP_LOAD_RELOAD"
  - wait-serial: "HCP2_SUPERVISOR_REAL_SKIP_RELOAD_OK"
  - wait-serial: "HCP2_SUPERVISOR_REAL_EPOCH_OK"
  - wait-serial: "HCP2_SUPERVISOR_REAL_MAILBOX_OK"
  - delay: 20s
  - expect-pin:
      part-id: sim
      pin: FAIL
      expected: 0
  - expect-pin:
      part-id: sim
      pin: PASS
      expected: 1
