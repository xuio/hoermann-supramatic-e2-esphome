substitutions:
  name: "supramatic-4-c6-hp-realtime"
  friendly_name: "Garage Door HCP2 C6 HP Realtime"
  hcp2_rx_pin: GPIO4
  hcp2_tx_pin: GPIO5
  hcp2_de_pin: GPIO0
  hcp2_re_pin: GPIO1

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf
    version: 5.5.4
    sdkconfig_options:
      CONFIG_ESP_SYSTEM_PANIC_PRINT_REBOOT: "n"
      CONFIG_ESP_SYSTEM_PANIC_PRINT_HALT: "y"
      CONFIG_ESP_TASK_WDT_EN: "y"
      CONFIG_ESP_TASK_WDT_INIT: "y"
      CONFIG_ESP_TASK_WDT_PANIC: "n"

external_components:
  - source:
      type: local
      path: ../components

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid_supramatic_4_tester
  password: !secret wifi_password_supramatic_4_tester
  reboot_timeout: 0s

api:
  reboot_timeout: 0s

safe_mode:
  disabled: true

hcp2bridge:
  id: hcp2_c6_hp_realtime
  backend: esp32c6_hp_realtime
  bench_enable_realtime_uart: true
  rx_pin: ${hcp2_rx_pin}
  tx_pin: ${hcp2_tx_pin}
  de_pin: ${hcp2_de_pin}
  re_pin: ${hcp2_re_pin}
  uart_num: 1
  slave_id: 2
  device_signature: "00000205043010FFA855"
  response_delay: 3700us
  button_press_duration: 100ms
  http_debug_port: 80
  protocol_log: false

cover:
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_c6_hp_realtime
    name: "${friendly_name}"
    device_class: garage

light:
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_c6_hp_realtime
    name: "${friendly_name} Light"

button:
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_c6_hp_realtime
    open:
      name: "${friendly_name} Open Command"
    close:
      name: "${friendly_name} Close Command"
    stop:
      name: "${friendly_name} Stop Command"
    half:
      name: "${friendly_name} Half Command"
    vent:
      name: "${friendly_name} Vent Command"
    light:
      name: "${friendly_name} Light Command"

interval:
  - interval: 10ms
    then:
      - lambda: |-
          const uint32_t start = micros();
          while ((uint32_t) (micros() - start) < 6000U) {
            asm volatile("nop");
          }
