substitutions:
  name: "supramatic-4-tester"
  friendly_name: "Garage Door HCP2 Tester"
  hcp2_rx_pin: GPIO4
  hcp2_tx_pin: GPIO5
  hcp2_de_pin: GPIO0
  hcp2_re_pin: GPIO1

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf
    version: 5.5.4
    sdkconfig_options:
      CONFIG_UART_ISR_IN_IRAM: "y"
      CONFIG_ESP_SYSTEM_PANIC_PRINT_REBOOT: "n"
      CONFIG_ESP_SYSTEM_PANIC_PRINT_HALT: "y"
      CONFIG_ESP_TASK_WDT_EN: "y"
      CONFIG_ESP_TASK_WDT_INIT: "y"
      CONFIG_ESP_TASK_WDT_PANIC: "n"

external_components:
  - source:
      type: local
      path: ../components

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid_supramatic_4_tester
  password: !secret wifi_password_supramatic_4_tester
  reboot_timeout: 0s
  ap:
    ssid: "${friendly_name} Setup"
    ap_timeout: 30s

improv_serial:

captive_portal:

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key_supramatic_4_tester

ota:
  - platform: esphome
    password: !secret ota_password_supramatic_4_tester

safe_mode:
  disabled: false
  num_attempts: 10
  boot_is_good_after: 1min
  reboot_timeout: 10min

hcp2bridge:
  id: hcp2_tester
  rx_pin: ${hcp2_rx_pin}
  tx_pin: ${hcp2_tx_pin}
  de_pin: ${hcp2_de_pin}
  re_pin: ${hcp2_re_pin}
  uart_num: 1
  slave_id: 2
  device_signature: "00000205043010FFA855"
  response_delay: 4200us
  button_press_duration: 100ms
  hp_fallback: false
  http_debug_port: 80
  protocol_log: true

cover:
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_tester
    name: "${friendly_name}"
    device_class: garage

light:
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_tester
    name: "${friendly_name} Light"

button:
  - platform: restart
    name: "${friendly_name} Restart"
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_tester
    open:
      name: "${friendly_name} Open Command"
    close:
      name: "${friendly_name} Close Command"
    stop:
      name: "${friendly_name} Stop Command"
    half:
      name: "${friendly_name} Half Command"
    vent:
      name: "${friendly_name} Vent Command"
    light:
      name: "${friendly_name} Light Command"

sensor:
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_tester
    lp_heartbeat:
      name: "${friendly_name} LP Heartbeat"
    lp_resets:
      name: "${friendly_name} LP Resets"
    polls_seen:
      name: "${friendly_name} Polls Seen"
    polls_answered:
      name: "${friendly_name} Polls Answered"
    missed_polls:
      name: "${friendly_name} Missed Polls"
    tx_aborts:
      name: "${friendly_name} TX Aborts"
    collisions:
      name: "${friendly_name} Collisions"
    crc_errors:
      name: "${friendly_name} CRC Errors"
    rx_errors:
      name: "${friendly_name} RX Errors"
    stop_trigger_fires:
      name: "${friendly_name} Stop Trigger Fires"
    lp_health_flags:
      name: "${friendly_name} LP Health Flags"
    max_rx_fifo:
      name: "${friendly_name} Max RX FIFO"
    max_loop:
      name: "${friendly_name} Max Loop"
    max_poll_rx_to_schedule:
      name: "${friendly_name} Max Poll RX To Schedule"
    max_response_schedule_to_tx_start:
      name: "${friendly_name} Max Response Schedule To TX Start"
    max_response_tx:
      name: "${friendly_name} Max Response TX"
    loop_overruns:
      name: "${friendly_name} Loop Overruns"
    rx_starvations:
      name: "${friendly_name} RX Starvations"
    stuck_de_recoveries:
      name: "${friendly_name} Stuck DE Recoveries"
    mailbox_repairs:
      name: "${friendly_name} Mailbox Repairs"
    hp_resets:
      name: "${friendly_name} HP Resets"
    hp_panic_resets:
      name: "${friendly_name} HP Panic Resets"
    hp_wdt_resets:
      name: "${friendly_name} HP WDT Resets"
    hp_brownout_resets:
      name: "${friendly_name} HP Brownout Resets"
    max_de_hold:
      name: "${friendly_name} Max DE Hold"
    last_poll_age:
      name: "${friendly_name} Last Poll Age"

binary_sensor:
  - platform: status
    name: "${friendly_name} ESPHome Status"
  - platform: hcp2bridge
    hcp2bridge_id: hcp2_tester
    got_valid_broadcast:
      name: "${friendly_name} Valid HCP2 Broadcast"
    moving:
      name: "${friendly_name} Moving"
    open:
      name: "${friendly_name} Open"
    closed:
      name: "${friendly_name} Closed"
    light:
      name: "${friendly_name} Light Feedback"
    obstruction:
      name: "${friendly_name} Obstruction"
    bus_online:
      name: "${friendly_name} HCP2 Bus Online"
    continuity_healthy:
      name: "${friendly_name} HCP2 Continuity Healthy"
    safe_for_ota_restart:
      name: "${friendly_name} Safe For OTA Restart"
    continuity_problem:
      name: "${friendly_name} HCP2 Continuity Problem"
